<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Cristian Casanova - 2026" />
    <link rel="icon" href="img/logo.png" type="image/png" sizes="any" />
    <link rel="stylesheet" href="css/cliente.css" />
    <link rel="stylesheet" href="css/clienteMediaQuery.css" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/all.min.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous"
    />
    <title>Mi Perfil | SportDeal FET</title>
  </head>
  <body>
    <aside class="sidebar-cli" id="sidebarCli">
      <div class="scli-header">
        <img src="img/logo.png" alt="Logo" class="scli-logo" />
        <span class="scli-nombre">SportDeal</span>
        <button class="scli-cerrar" id="btnCerrarSidebar">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="scli-perfil">
        <div class="scli-avatar">LC</div>
        <div>
          <span class="scli-user">Luis Castillo</span>
          <span class="scli-email">luis@fet.edu.co</span>
        </div>
      </div>
      <nav class="scli-nav">
        <ul>
          <li class="scli-item">
            <a href="cliente-dashboard.html" class="scli-link"
              ><i class="fa-solid fa-house"></i><span>Mis Rentas</span></a
            >
          </li>
          <li class="scli-item activo">
            <a href="perfil.html" class="scli-link"
              ><i class="fa-solid fa-user-pen"></i><span>Mi Perfil</span></a
            >
          </li>
          <li class="scli-item">
            <a href="index.html" class="scli-link"
              ><i class="fa-solid fa-basket-shopping"></i
              ><span>Explorar Catálogo</span></a
            >
          </li>
          <li class="scli-item">
            <a href="carrito.html" class="scli-link"
              ><i class="fa-solid fa-cart-shopping"></i><span>Mi Carrito</span
              ><span class="scli-badge">2</span></a
            >
          </li>
        </ul>
      </nav>
      <div class="scli-footer">
        <a href="login.html" class="scli-salir"
          ><i class="fa-solid fa-right-from-bracket"></i
          ><span>Cerrar Sesión</span></a
        >
      </div>
    </aside>

    <div class="cli-overlay" id="overlay"></div>

    <div class="cli-principal">
      <div class="cli-topbar">
        <button class="cli-hamburguesa" id="btnAbrirSidebar">
          <i class="fa-solid fa-bars"></i>
        </button>
        <div class="cli-topbar-titulo"><h2>Mi Perfil</h2></div>
        <div class="cli-topbar-acciones">
          <a href="index.html" class="btn-explorar-top">
            <i class="fa-solid fa-plus"></i> <span>Nueva renta</span>
          </a>
          <a href="carrito.html" class="cli-carrito">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="carrito-badge-top">2</span>
          </a>
        </div>
      </div>

      <div class="cli-main">
        <div class="perfil-form-card">
          <!-- Avatar y nombre -->
          <div class="perfil-avatar-sec">
            <div class="perfil-avatar-grande">LC</div>
            <div class="perfil-avatar-info">
              <h4>Luis Castillo</h4>
              <p>Cliente desde Febrero 2026 · 7 rentas realizadas</p>
            </div>
          </div>

          <!-- Campos del formulario -->
          <div class="perfil-campos">
            <div class="perfil-campo">
              <label>Nombre</label>
              <input type="text" value="Luis" />
            </div>
            <div class="perfil-campo">
              <label>Apellido</label>
              <input type="text" value="Castillo" />
            </div>
            <div class="perfil-campo">
              <label>Correo Electrónico</label>
              <input type="email" value="luis@fet.edu.co" disabled />
            </div>
            <div class="perfil-campo">
              <label>Teléfono</label>
              <input type="tel" value="+57 310 000 0000" />
            </div>
            <div class="perfil-campo">
              <label>Número de Identificación</label>
              <input type="text" value="1.098.XXX.XXX" />
            </div>
            <div class="perfil-campo">
              <label>Ciudad</label>
              <input type="text" value="Neiva, Huila" />
            </div>
          </div>

          <!-- Acciones -->
          <div class="perfil-acciones">
            <button class="btn-guardar-perfil">
              <i class="fa-solid fa-floppy-disk"></i> Guardar cambios
            </button>
            <button class="btn-cambiar-pass">
              <i class="fa-solid fa-lock"></i> Cambiar contraseña
            </button>
            <button class="btn-eliminar-cuenta">
              <i class="fa-solid fa-user-xmark"></i> Eliminar cuenta
            </button>
          </div>
        </div>
      </div>

      <footer class="cli-footer">
        <small>Cristian Casanova &copy; 2026 - FET</small>
      </footer>
    </div>

    <script src="js/cliente.js"></script>
  </body>
</html>
