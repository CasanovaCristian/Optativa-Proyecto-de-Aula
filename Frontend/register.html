<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/default.css" type="text/css" />
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/js/all.min.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous"
    />
    <title>Crear Cuenta | SportDeal</title>
  </head>
  <body>
    <header>
      <img class="logo" src="img/logo.png" alt="Logo" />
      <h1>MoveLease</h1>
    </header>

    <main>
      <form class="form-login" id="registerForm">
        <h2>Registro</h2>
        <input
          id="user-sign"
          type="text"
          name="nombre-completo"
          class="input-login"
          placeholder="Nombre Completo"
          title="Introduce su nombre completo"
          pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]{3,100}$"
          minlength="3"
          maxlength="100"
          autocomplete="name"
          required
        />
        <input
          id="email-sign"
          type="email"
          name="email-signin"
          class="input-login"
          placeholder="Correo Electrónico"
          title="Introduce su correo electrónico"
          pattern="^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[A-Za-z]{2,}$"
          minlength="8"
          maxlength="100"
          autocomplete="email"
          required
        />
        <div class="password-field">
          <input
            id="password-sign"
            type="password"
            name="password-sign"
            class="input-login"
            placeholder="Contraseña"
            title="Introduce su contraseña"
            pattern="(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,25}"
            minlength="8"
            maxlength="25"
            autocomplete="new-password"
            required
          />
          <i
            class="fa-solid fa-eye toggle-password"
            data-target="password-sign"
          ></i>
        </div>

        <div class="password-field">
          <input
            id="password-sign-confirm"
            type="password"
            name="password-confirm"
            class="input-login"
            placeholder="Confirmar Contraseña"
            title="Confirma tu contraseña"
            pattern="(?=.*[A-Z])(?=.*\d)(?=.*[^A-Za-z0-9]).{8,25}"
            minlength="8"
            maxlength="25"
            autocomplete="new-password"
            required
          />
          <i
            class="fa-solid fa-eye toggle-password"
            data-target="password-sign-confirm"
          ></i>
        </div>

        <div id="mensajeError" style="color: red; display: none; margin-bottom: 1rem;"></div>
        <input type="submit" class="btn-ingresar" value="Registrar" />
      </form>

      <div class="out-login">
        <a href="login.html">¿Ya tienes cuenta? Inicia sesión</a>
      </div>
    </main>

    <footer>
      <small>Cristian Casanova &copy; 2026 FET</small>
    </footer>

    <script src="js/toggle.js"></script>
    <script src="js/api.js"></script>
    <script>
      document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const nombre = document.getElementById("user-sign").value;
        const email = document.getElementById("email-sign").value;
        const password = document.getElementById("password-sign").value;
        const passwordConfirm = document.getElementById("password-sign-confirm").value;
        const errorDiv = document.getElementById("mensajeError");

        if (password !== passwordConfirm) {
          errorDiv.textContent = "Las contraseñas no coinciden";
          errorDiv.style.display = "block";
          return;
        }

        try {
          const response = await usuariosAPI.registro(nombre, email, password);
          if (response.id) {
            window.location.href = "login.html";
          } else {
            errorDiv.textContent = "Error al registrar usuario";
            errorDiv.style.display = "block";
          }
        } catch (error) {
          errorDiv.textContent = error.message || "Error en el registro";
          errorDiv.style.display = "block";
        }
      });
    </script>
  </body>
</html>
